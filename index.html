<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>動画編集ポートフォリオ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #0a0a1a, #000);
      color: #e0e0ff;
    }
    header {
      background: url('images/otter-banner.png') center/cover no-repeat;
      text-align: center;
      padding: 120px 10vw;
      color: #fff;
      text-shadow: 0 0 10px #3b82f6;
    }
    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }
    p {
      line-height: 1.8;
      font-size: 16px;
    }
    .btn {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      margin: 10px;
      font-weight: bold;
      transition: 0.3s;
    }
    .btn-primary {
      background: #3b82f6;
      color: #fff;
      box-shadow: 0 0 10px #3b82f6;
    }
    .btn-outline {
      border: 1px solid #3b82f6;
      color: #3b82f6;
    }
    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #60a5fa;
    }
    section {
      padding: 80px 10vw;
      backdrop-filter: blur(4px);
    }
    h2 {
      font-size: 28px;
      margin-bottom: 20px;
      color: #60a5fa;
      text-shadow: 0 0 8px #3b82f6;
    }
    .grid {
      display: grid;
      gap: 24px;
    }
    .grid-3 {
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }
    .card {
      background: rgba(20, 20, 40, 0.8);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 0 10px #1e3a8a;
      transition: 0.3s;
    }
    .card:hover {
      box-shadow: 0 0 20px #3b82f6;
      transform: translateY(-5px);
    }
    footer {
      text-align: center;
      padding: 40px;
      font-size: 12px;
      color: #9ca3af;
