<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>動画編集ポートフォリオ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Noto+Sans+JP:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: "Poppins", "Noto Sans JP", sans-serif;
      background: radial-gradient(circle at top, #0a0a1a, #000);
      color: #e0e0ff;
      animation: glow 12s ease-in-out infinite;
    }

    @keyframes glow {
      0% { background: radial-gradient(circle at top, #0a0a1a, #000); }
      50% { background: radial-gradient(circle at top, #111133, #000); }
      100% { background: radial-gradient(circle at top, #0a0a1a, #000); }
    }

    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(10,10,30,0.8);
      backdrop-filter: blur(6px);
      padding: 12px 20px;
      display: flex;
      justify-content: center;
      gap: 30px;
      z-index: 999;
    }
    .navbar a {
      color: #60a5fa;
      text-decoration: none;
      font-weight: 600;
    }
    .navbar a:hover { color: #fff; }

    .logo {
      position: absolute;
      top: 20px;
      left: 40px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 1000;
    }
    .logo img {
      width: 60px;
      border-radius: 50%;
      box-shadow: 0 0 10px #3b82f6;
    }
    .logo span {
      font-size: 20px;
      font-weight: 700;
      color: #60a5fa;
      text-shadow: 0 0 10px #3b82f6;
    }

    header {
      background: url('https://ishikin5tv-bot.github.io/-1/images/otter-banner.png') center/cover no-repeat;
      text-align: center;
      padding: 160px 10vw 120px;
      color: #fff;
      text-shadow: 0 0 10px #3b82f6;
      position: relative;
    }
    header::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
    }
    header * { position: relative; z-index: 2; }

    h1 { font-size: 42px; margin-bottom: 10px; }
    p { line-height: 1.8; font-size: 16px; }

    .btn {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      margin: 10px;
      font-weight: bold;
      transition: 0.3s;
    }
    .btn-primary {
      background: #3b82f6;
      color: #fff;
      box-shadow: 0 0 10px #3b82f6;
    }
    .btn-outline {
      border: 1px solid #3b82f6;
      color: #3b82f6;
    }
    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #60a5fa;
    }

    section {
      padding: 100px 10vw;
      backdrop-filter: blur(4px);
    }

    h2 {
      font-size: 28px;
      margin-bottom: 20px;
      color: #60a5fa;
      text-shadow: 0 0 8px #3b82f6;
    }

    .grid {
      display: grid;
      gap: 24px;
    }
    .grid-3 {
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    .card {
      background: rgba(20, 20, 40, 0.8);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 0 10px #1e3a8a;
      transition: 0.3s;
      position: relative;
      overflow: hidden;
    }
    .card:hover {
      box-shadow: 0 0 25px #3b82f6, 0 0 50px #60a5fa;
      transform: translateY(-8px);
    }

    .thumb {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
    }
    .thumb img {
      width: 100%;
      display: block;
      border-radius: 8px;
    }
    .thumb::after {
      content: "▶ My Daily Vlog";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-weight: 700;
      font-size: 18px;
      padding: 10px;
      text-align: center;
      text-shadow: 0 0 5px #000;
    }

    .profile-img {
      width: 180px;
      border-radius: 50%;
      box-shadow: 0 0 15px #3b82f6;
      margin-bottom: 20px;
    }

    footer {
      text-align: center;
      padding: 40px;
      font-size: 12px;
      color: #9ca3af;
    }

    @media (max-width: 768px) {
      .grid-3 { grid-template-columns: 1fr; }
      header { padding: 120px 5vw; }
    }
  </style>
</head>
